name: CI / Publish

on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit Tests
        run: dotnet test tests/QdrantSkillsMCP.UnitTests --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/healthz && exit 0
            sleep 2
          done
          echo "Qdrant failed to start" && exit 1

      - name: Integration Tests (non-Aspire)
        run: dotnet test tests/QdrantSkillsMCP.IntegrationTests --no-build -c Release --filter "Category!=Aspire"

      - name: Pack
        run: dotnet pack src/QdrantSkillsMCP.Infrastructure/QdrantSkillsMCP.Infrastructure.csproj -c Release --no-build -o ./artifacts

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore and build
        run: dotnet build src/QdrantSkillsMCP.Infrastructure/QdrantSkillsMCP.Infrastructure.csproj -c Release

      - name: Pack with tag version
        run: dotnet pack src/QdrantSkillsMCP.Infrastructure/QdrantSkillsMCP.Infrastructure.csproj -c Release -o ./artifacts

      - name: Publish to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/*.nupkg

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/qdrant-skills-mcp:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/qdrant-skills-mcp:latest
